<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Pendu - Dynamique</title>
    <style>
        body {
            background-color: #121212; color: #00ff00;
            font-family: 'Consolas', 'Courier New', monospace;
            display: flex; flex-direction: column; align-items: center;
            margin: 0; padding: 20px;
        }
        #terminal {
            background-color: #000; border: 2px solid #00ff00;
            padding: 20px; width: 800px; height: 500px;
            white-space: pre; overflow-y: auto; font-size: 15px; box-shadow: 0 0 10px #00ff00;
        }
        .input-zone { margin-top: 15px; display: flex; width: 840px; }
        input {
            flex-grow: 1; background: #222; color: #00ff00; border: 1px solid #00ff00;
            padding: 10px; font-family: inherit; font-size: 16px; outline: none;
        }
        button { background: #00ff00; color: #000; font-weight: bold; border: none; padding: 10px 20px; cursor: pointer; }
        
        #zone-classement {
            margin-top: 20px; border: 2px solid #00ff00; padding: 15px; 
            width: 800px; background-color: #000; box-shadow: 0 0 10px #00ff00;
        }
        table { width: 100%; color: #00ff00; border-collapse: collapse; }
        th, td { padding: 8px; text-align: left; }
        th { border-bottom: 2px solid #00ff00; }
        .text-right { text-align: right; }
        .derniere-partie { background-color: rgba(0, 255, 0, 0.25); color: #fff; font-weight: bold; }
    </style>
</head>
<body>
    <div id="terminal">Connexion au serveur Java...</div>
    <div class="input-zone">
        <input type="text" id="inputBox" placeholder="Tapez ici..." autocomplete="off" autofocus>
        <button onclick="envoyer()">Entrée</button>
    </div>

    <div id="zone-classement">
        <h3 style="text-align: center; margin-top: 0;">🏆 TOP 10 DES PARTIES CLASSÉES</h3>
        <table>
            <thead>
                <tr>
                    <th>Rang</th>
                    <th>Joueur</th>
                    <th class="text-right">Score</th>
                </tr>
            </thead>
            <tbody id="corps-classement">
                <tr><td colspan="3" style="text-align: center; color: #666;">En attente de résultats...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        const socket = new WebSocket("wss://suitor-defog-dreaded.ngrok-free.dev");
        const terminal = document.getElementById("terminal");
        const input = document.getElementById("inputBox");
        const corpsClassement = document.getElementById("corps-classement");
        
        let listeParties = [];

        socket.onmessage = (event) => {
            const msg = event.data;

            if (msg.startsWith("SCORE_UPDATE:")) {
                const parts = msg.split(":");
                if (parts.length < 3) return;

                // On transforme le nom en MAJUSCULE pour éviter les doublons nelson/NELSON
                const nom = parts[1].toUpperCase().trim();
                const scoreNum = parseInt(parts[2]);

                if (isNaN(scoreNum)) return;

                // Vérifie si cette copie exacte existe déjà
                const existe = listeParties.some(p => p.nom === nom && p.score === scoreNum);
                
                if (!existe) {
                    listeParties.forEach(p => p.actuelle = false);
                    listeParties.push({ nom: nom, score: scoreNum, actuelle: true });
                    
                    // Tri du plus grand au plus petit
                    listeParties.sort((a, b) => b.score - a.score);
                    
                    // Reconstruction propre du tableau
                    corpsClassement.innerHTML = "";
                    listeParties.slice(0, 10).forEach((p, index) => {
                        const ligne = document.createElement("tr");
                        if (p.actuelle) {
                            ligne.className = "derniere-partie";
                            ligne.innerHTML = `<td>⚡ ${index + 1}</td><td>${p.nom} (Nouveau !)</td><td class="text-right">${p.score} pts</td>`;
                        } else {
                            ligne.innerHTML = `<td># ${index + 1}</td><td>${p.nom}</td><td class="text-right">${p.score} pts</td>`;
                        }
                        corpsClassement.appendChild(ligne);
                    });
                }
            } else {
                terminal.innerText = msg;
                terminal.scrollTop = terminal.scrollHeight;
            }
        };

        function envoyer() {
            if (input.value.trim() !== "") {
                socket.send(input.value);
                input.value = "";
            }
            input.focus();
        }

        input.addEventListener("keypress", (e) => { if (e.key === "Enter") envoyer(); });
    </script>
</body>
</html>
