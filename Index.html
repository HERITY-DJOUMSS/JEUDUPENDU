<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Pendu - Dynamique</title>
    <style>
        body {
            background-color: #121212; color: #00ff00;
            font-family: 'Consolas', 'Courier New', monospace;
            display: flex; flex-direction: column; align-items: center;
            margin: 0; padding: 20px;
        }
        #terminal {
            background-color: #000; border: 2px solid #00ff00;
            padding: 20px; width: 800px; height: 500px;
            white-space: pre; /* Indispensable pour l'ASCII et le MCD */
            overflow-y: auto; font-size: 15px; box-shadow: 0 0 10px #00ff00;
        }
        .input-zone { margin-top: 15px; display: flex; width: 840px; }
        input {
            flex-grow: 1; background: #222; color: #00ff00; border: 1px solid #00ff00;
            padding: 10px; font-family: inherit; font-size: 16px; outline: none;
        }
        button {
            background: #00ff00; color: #000; font-weight: bold;
            border: none; padding: 10px 20px; cursor: pointer;
        }
        button:hover { background: #00cc00; }

        /* Style ajouté pour le tableau de classement */
        #zone-classement {
            margin-top: 20px; border: 1px solid #00ff00; padding: 15px; 
            width: 808px; background-color: #000; box-shadow: 0 0 5px #00ff00;
        }
        table { width: 100%; color: #00ff00; border-collapse: collapse; }
        th, td { padding: 8px; text-align: left; }
        th { border-bottom: 1px solid #00ff00; text-transform: uppercase; }
        .text-right { text-align: right; }
    </style>
</head>
<body>
    <div id="terminal">Connexion au serveur Java...</div>
    <div class="input-zone">
        <input type="text" id="inputBox" placeholder="Tapez ici..." autocomplete="off" autofocus>
        <button onclick="envoyer()">Entrée</button>
    </div>

    <div id="zone-classement">
        <h3 style="color: #00ff00; text-align: center; margin-top: 0; letter-spacing: 2px;">🏆 TOP 10 DERNIÈRES PARTIES</h3>
        <table>
            <thead>
                <tr>
                    <th style="width: 10%;">Pos.</th>
                    <th style="width: 60%;">Joueur</th>
                    <th style="width: 30%;" class="text-right">Score</th>
                </tr>
            </thead>
            <tbody id="corps-classement">
                <tr><td colspan="3" style="text-align: center; padding: 10px; color: #888;">Aucune partie enregistrée</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        const socket = new WebSocket("wss://suitor-defog-dreaded.ngrok-free.dev");
        const terminal = document.getElementById("terminal");
        const input = document.getElementById("inputBox");
        const corpsClassement = document.getElementById("corps-classement");

        socket.onmessage = (event) => {
            const msg = event.data;

            // Interception des messages de classement
            if (msg.startsWith("CLASSEMENT:")) {
                const listeRaw = msg.replace("CLASSEMENT:", "");
                if (listeRaw.trim() === "") return;

                const scores = listeRaw.split(";");
                corpsClassement.innerHTML = ""; // Réinitialise le tableau

                scores.forEach((entry, index) => {
                    if (entry.trim() !== "") {
                        const parts = entry.split(" - ");
                        const joueur = parts[0] || "Anonyme";
                        const score = parts[1] || "0 pts";

                        const ligne = document.createElement("tr");
                        ligne.innerHTML = `
                            <td>${index + 1}</td>
                            <td>${joueur}</td>
                            <td class="text-right">${score}</td>
                        `;
                        corpsClassement.appendChild(ligne);
                    }
                });
            } else {
                // Comportement standard pour l'affichage du jeu
                terminal.innerText = msg;
                terminal.scrollTop = terminal.scrollHeight; 
            }
        };

        function envoyer() {
            if (input.value.trim() !== "") {
                socket.send(input.value);
                input.value = "";
            }
            input.focus();
        }

        input.addEventListener("keypress", (e) => {
            if (e.key === "Enter") envoyer();
        });
    </script>
</body>
</html>
