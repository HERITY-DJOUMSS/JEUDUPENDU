<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Pendu - Dynamique</title>
    <style>
        body {
            background-color: #121212; color: #00ff00;
            font-family: 'Consolas', 'Courier New', monospace;
            display: flex; flex-direction: column; align-items: center;
            margin: 0; padding: 20px;
        }
        #terminal {
            background-color: #000; border: 2px solid #00ff00;
            padding: 20px; width: 800px; height: 500px;
            white-space: pre; /* Indispensable pour l'ASCII et le MCD */
            overflow-y: auto; font-size: 15px; box-shadow: 0 0 10px #00ff00;
        }
        .input-zone { margin-top: 15px; display: flex; width: 840px; }
        input {
            flex-grow: 1; background: #222; color: #00ff00; border: 1px solid #00ff00;
            padding: 10px; font-family: inherit; font-size: 16px; outline: none;
        }
        button {
            background: #00ff00; color: #000; font-weight: bold;
            border: none; padding: 10px 20px; cursor: pointer;
        }
        button:hover { background: #00cc00; }

        /* Styles de la zone de classement */
        #zone-classement {
            margin-top: 20px; border: 2px solid #00ff00; padding: 15px; 
            width: 800px; background-color: #000; box-shadow: 0 0 10px #00ff00;
        }
        table { width: 100%; color: #00ff00; border-collapse: collapse; font-size: 16px; }
        th, td { padding: 10px; text-align: left; }
        th { border-bottom: 2px solid #00ff00; text-transform: uppercase; letter-spacing: 1px; }
        .text-right { text-align: right; }

        /* Effet spécial clignotant pour détacher la dernière partie jouée */
        .derniere-partie {
            background-color: rgba(0, 255, 0, 0.2) !important;
            color: #fff !important;
            font-weight: bold;
            animation: cyber-flash 1.5s infinite alternate;
        }
        @keyframes cyber-flash {
            0% { box-shadow: inset 0 0 5px rgba(0,255,0,0.3); }
            100% { box-shadow: inset 0 0 20px rgba(0,255,0,0.7); }
        }
    </style>
</head>
<body>
    <div id="terminal">Connexion au serveur Java...</div>
    <div class="input-zone">
        <input type="text" id="inputBox" placeholder="Tapez ici..." autocomplete="off" autofocus>
        <button onclick="envoyer()">Entrée</button>
    </div>

    <div id="zone-classement">
        <h3 style="color: #00ff00; text-align: center; margin-top: 0; letter-spacing: 2px;">🏆 TOP 10 DES MEILLEURES PARTIES</h3>
        <table>
            <thead>
                <tr>
                    <th style="width: 15%;">Rang</th>
                    <th style="width: 55%;">Joueur</th>
                    <th style="width: 30%;" class="text-right">Score</th>
                </tr>
            </thead>
            <tbody id="corps-classement">
                <tr><td colspan="3" style="text-align: center; padding: 15px; color: #666;">Aucune partie enregistrée</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        const socket = new WebSocket("wss://suitor-defog-dreaded.ngrok-free.dev");
        const terminal = document.getElementById("terminal");
        const input = document.getElementById("inputBox");
        const corpsClassement = document.getElementById("corps-classement");

        socket.onmessage = (event) => {
            const msg = event.data;

            if (msg.startsWith("CLASSEMENT:")) {
                const章 listeRaw = msg.replace("CLASSEMENT:", "");
                if (listeRaw.trim() === "") {
                    corpsClassement.innerHTML = `<tr><td colspan="3" style="text-align: center; padding: 15px; color: #666;">Aucune partie trouvée dans le fichier</td></tr>`;
                    return;
                }

                const scores = listeRaw.split(";");
                corpsClassement.innerHTML = ""; 

                scores.forEach((entry, index) => {
                    if (entry.trim() !== "") {
                        const estDerniere = entry.includes(" - LAST");
                        // Nettoyer la chaîne pour l'affichage pur
                        const propreEntry = entry.replace(" - LAST", "");
                        const parts = propreEntry.split(" - ");
                        
                        const joueur = parts[0] || "Anonyme";
                        const score = parts[1] || "0 pts";

                        const ligne = document.createElement("tr");
                        
                        // Si c'est la dernière partie, appliquer la classe CSS et le symbole éclair
                        if (estDerniere) {
                            ligne.className = "derniere-partie";
                            ligne.innerHTML = `
                                <td>⚡ ${index + 1}</td>
                                <td>${joueur} (Votre partie)</td>
                                <td class="text-right">${score}</td>
                            `;
                        } else {
                            ligne.innerHTML = `
                                <td># ${index + 1}</td>
                                <td>${joueur}</td>
                                <td class="text-right">${score}</td>
                            `;
                        }
                        corpsClassement.appendChild(ligne);
                    }
                });
            } else {
                terminal.innerText = msg;
                terminal.scrollTop = terminal.scrollHeight; 
            }
        };

        function envoyer() {
            if (input.value.trim() !== "") {
                socket.send(input.value);
                input.value = "";
            }
            input.focus();
        }

        input.addEventListener("keypress", (e) => {
            if (e.key === "Enter") envoyer();
        });
    </script>
</body>
</html>
